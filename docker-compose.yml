version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: advantage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: advantage
      POSTGRES_PASSWORD: advantage_dev_2024
      POSTGRES_DB: advantage_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5450:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advantage -d advantage_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: advantage-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
